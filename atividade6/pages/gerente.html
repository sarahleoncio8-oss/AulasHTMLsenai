<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema - Gerente</title>
</head>

<body>
    <main>
        <h1>Sua página de GERENTE</h1>
        <form>
            <h2>Cadastro de funcionario novo:</h2>
            <div class="mb-3">
                <label class="form-label" for="nome-funcionario">Digite o nome do funcionário:</label>
                <input class="form-control p-3" type="text" id="nome-funcionario" placeholder="Ex: João de Menezes">
            </div>
            <div class="mb-3">
                <p>Horário de trabalho</p>
                <select name="periodo" id="horas-funcionario">
                    <option value="20">20h semanais</option>
                    <option value="30">30h semanais</option>
                    <option value="40">40h semanais</option>
                </select>
            </div>
            <br>
            <div class="mb-3">
                <label class="form-label" for="cargo-funcionario">Digite o cargo do funcionário:</label>
                <input class="form-control p-3" type="text" id="cargo-funcionario" placeholder="Ex: Desenvolvedor">
            </div>
            <br>
            <button type="button" onclick="cadastrarFuncionario()">
                CADASTRAR FUNCIONARIO
            </button>
            <script src="../js/cadastroFuncinario.js"></script>
        </form>
    </main>
</body>

</html>
